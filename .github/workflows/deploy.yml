name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages 
      url: ${{ steps.development.outputs.pages_url }}

    defaults:
      run:
        working-directory: personal-cv-react   # 👈 change if folder name is different

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: personal-cv-react/package-lock.json

      - run: npm install
      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: personal-cv-react/dist

      - name: Deploy to Github Pages
        id: deployment
       uses: actions/deploy-pages@v4